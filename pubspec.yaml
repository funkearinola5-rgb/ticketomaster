name: ticketmaster
description: "A new Flutter project."
publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ">=3.5.4 <4.0.0"


dependencies:
  flutter:
    sdk: flutter

  cloud_firestore: ^6.0.2
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.0.2
  firebase_core: ^4.0.2
  firebase_storage: ^13.0.2
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.13.0

 
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/splash_screen.mp4
    - assets/icon.jpg
    - assets/icon_foreground.png
    - assets/hero.jpg
    - assets/talent.jpg
    - assets/tm/
    - assets/tm_nav/
    - assets/tm_nav_norm/
    - assets/apk/images/
    - assets/apk/images/bottom/
    - assets/apk/images/bottom_click/
    - assets/apk/images/bottom/01.png
    - assets/apk/images/bottom/02.png
    - assets/apk/images/bottom/03.png
    - assets/apk/images/bottom/04.png
    - assets/apk/images/bottom/05.png
    - assets/apk/images/bottom_click/1.png
    - assets/apk/images/bottom_click/2.png
    - assets/apk/images/bottom_click/3.png
    - assets/apk/images/bottom_click/4.png
    - assets/apk/images/bottom_click/5.png

  fonts:
    - family: Metropolis
      fonts:
        - asset: assets/fonts/metropolis/Metropolis-Thin.otf
          weight: 100
        - asset: assets/fonts/metropolis/Metropolis-Regular.otf
          weight: 400
        - asset: assets/fonts/metropolis/Metropolis-Medium.otf
          weight: 500
        - asset: assets/fonts/metropolis/Metropolis-SemiBold.otf
          weight: 600
        - asset: assets/fonts/metropolis/Metropolis-Bold.otf
          weight: 700

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon.jpg
  adaptive_icon_background: "#026CDF"
  adaptive_icon_foreground: assets/icon_foreground.png
